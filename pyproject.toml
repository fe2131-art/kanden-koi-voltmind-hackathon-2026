[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "safety-agent"
version = "0.1.0"
description = "Safety View Agent: LangGraph-based agent for safety assessment"
readme = "CLAUDE.md"
requires-python = ">=3.11"
authors = [
    {name = "Safety Team"}
]

dependencies = [
    "pydantic>=2.0",
    "langgraph>=1.0.9",
    "langchain-core>=0.1.0",
    "httpx>=0.24.0",
    "typer>=0.9.0",
    "pyyaml>=6.0",
    "pillow>=10.0",
]

[project.optional-dependencies]
yolo = ["ultralytics>=8.0"]
finetune = [
    "torch>=2.0",
    "transformers>=4.30",
    "peft>=0.4",
    "datasets>=2.0",
    "safetensors>=0.3",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1.0",
    "pyright>=1.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-v --cov=src --cov-report=term-missing --cov-report=html"
testpaths = ["tests"]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
]
ignore = ["E501"]  # line-too-long

[tool.ruff.lint.isort]
known-first-party = ["safety_agent"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
reportOptionalMemberAccess = "information"
reportOptionalSubscript = "information"
reportArgumentType = "warning"
reportMissingImports = "warning"
reportInvalidTypeForm = "warning"
