# Safety View Agent - Default Configuration

# Agent parameters
agent:
  max_steps: 1    # デフォルト：1フレーム実行
  enable_yolo: false
  enable_audio: false
  max_outstanding_regions: 6        # 次に観測すべき候補領域の検討数上限
  context_history_size: 1           # LLM に渡す前回結果の数（0=なし, 1=前回のみ）

# LLM configuration
llm:
  # Provider: "vllm" (local) or "openai" (API)
  provider: "openai"

  # vLLM settings (local server)
  vllm:
    base_url: "http://localhost:8000"  # Override via LLM_BASE_URL
    model: "your-local-model"          # Override via LLM_MODEL
    api_key: "EMPTY"
    timeout_s: 60.0

  # OpenAI settings (API)
  openai:
    base_url: "https://api.openai.com"
    model: "gpt-5-nano"    # Vision-capable model (Override via OPENAI_MODEL)
    api_key: null                      # Must be set via OPENAI_API_KEY
    timeout_s: 60.0

# VLM 設定（Vision Language Model / 画像分析専用）
# model: null の場合 → llm.openai.model を自動参照（共有設定）
vlm:
  provider: "openai"     # "openai" | "vllm"（ローカル vLLM サーバー）
  openai:
    base_url: "https://api.openai.com"
    model: "gpt-5-nano"    # null → llm.openai.model を流用
    timeout_s: 60.0
  vllm:
    base_url: "http://localhost:8000"  # vLLM サーバーのベースURL（provider: "vllm" の場合のみ使用）
    model: null    # null → llm.vllm.model を流用
    timeout_s: 60.0

# Data input mode
data:
  mode: "manual"  # "manual" | "inspesafe"

  # manual モード: data/videos/ の動画を使用（デフォルト）

  # inspesafe モード: InspecSafe-V1 のセッションを指定
  inspesafe:
    dataset_path: "../InspecSafe-V1"  # プロジェクトルートからの相対パス
    session: "train/Other_modalities/58132919535743_20251118_session_1400_2#bowenguanshang-you"
    # 注: session は DATA_PATH/ 以降の相対パスを指定

# Video and Audio processing
video:
  fps: 1.0            # フレーム抽出レート (0.5-2.0 推奨)
  max_frames: 30      # 最大フレーム数 (0 = 無制限)
  clear_frames: false # true = 実行前に data/frames/ を削除して再実行
  formats:
    extensions: [".mp4", ".avi", ".mov", ".mkv", ".webm"]
    frame_output: "frame_{timestamp}s.jpg"

audio:
  output_filename: "audio.wav"
  sample_rate: 16000
  channels: 1
  codec: "pcm_s16le"

# LLM トークン設定
tokens:
  vision_max_completion_tokens: 5000  # Vision API: 推論 + 応答用（gpt-5-nano は推論に 4000+ 使用）
  chat_max_tokens: 4000               # テキスト生成用（推論トークンを考慮して 2000 から増加）

# Thresholds
thresholds:
  risk_stop_threshold: 0.2      # Stop if max unobserved risk <= this
  hazard_focus_threshold: 0.6   # Enforce high-risk unobserved coverage