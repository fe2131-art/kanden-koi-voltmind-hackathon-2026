# Safety View Agent - Default Configuration

# Agent parameters
agent:
  max_steps: -1    # -1 = 動画全体を実行、N = 最初のN フレームのみ
  enable_audio: true
  enable_depth: true
  enable_infrared: true            # 赤外線画像解析有効化（enable_infrared: true でアクティベート）
  enable_temporal: true            # 時系列変化検出有効化（前後フレーム比較、enable_temporal: true でアクティベート）
  context_history_size: 0           # LLM に渡す前回判断の数（0=なし, 1=直近1フレーム, N=直近Nフレーム）

# LLM configuration
llm:
  # Provider: "vllm" (local) or "openai" (API)
  provider: "vllm"

  # vLLM settings (local server)
  vllm:
    base_url: "http://localhost:8000/v1"
    model: "Qwen/Qwen3.5-9B"
    api_key: "EMPTY"
    timeout_s: 60.0

  # OpenAI settings (API)
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-5-nano"    # Vision-capable model
    api_key: null                      # Must be set via OPENAI_API_KEY
    timeout_s: 60.0

# VLM 設定（Vision Language Model）
# model: null の場合 → llm.openai.model を自動参照（共有設定）
vlm:
  provider: "vllm"     # "openai" | "vllm"（ローカル vLLM サーバー）
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-5-nano"    # null → llm.openai.model を流用
    timeout_s: 60.0
  vllm:
    base_url: "http://localhost:8000/v1"
    model: "Qwen/Qwen3.5-9B"
    timeout_s: 60.0

# ALM (Audio-Language Model) 設定
alm:
  provider: "vllm"     # "openai" | "vllm"
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-5-nano"
    timeout_s: 60.0
  vllm:
    base_url: "http://localhost:8001/v1"
    model: "Qwen/Qwen2.5-Omni-7B"
    timeout_s: 60.0

# Data input mode
data:
  mode: "inspesafe"  # "manual" | "inspesafe"

  # manual モード: data/videos/ の動画を使用（デフォルト）

  # inspesafe モード: InspecSafe-V1 のセッションを指定
  inspesafe:
    dataset_path: "/home/team-005/data/hf_cache/hub/datasets--Tetrabot2026--InspecSafe-V1/snapshots/6d58d012079ba6441c474be54d7a93dd9d70c01c"
    session: "train/Other_modalities/58132919535743_20251118_session_1400_2#bowenguanshang-you"

# Video and Audio processing
video:
  fps: 1.0            # フレーム抽出レート (0.5-2.0 推奨)
  max_frames: 0       # 最大フレーム数 (0 = 無制限、全フレーム処理用)
  clear_frames: false # true = 実行前に data/frames/ を削除して再実行
  formats:
    extensions: [".mp4", ".avi", ".mov", ".mkv", ".webm"]
    frame_output: "frame_{timestamp}s.jpg"

audio:
  output_filename: "audio.wav"
  sample_rate: 16000
  window_seconds: 3.0
  channels: 1
  codec: "pcm_s16le"

# LLM トークン設定
tokens:
  vision_max_completion_tokens: 8192  # Vision API: 16k コンテキスト対応
  chat_max_tokens: 8192               # テキスト生成用: 詳細な構造化出力対応

# Thresholds
thresholds:
  risk_stop_threshold: 0.2      # Stop if max unobserved risk <= this
  hazard_focus_threshold: 0.6   # Enforce high-risk unobserved coverage

# TTS (Text-to-Speech) 設定 — Qwen3-TTS バッチ合成
tts:
  # サーバ URL（vllm-omni で起動したサーバ: slurm/qwen_tts_server.sh または
  # vllm-omni serve <MODEL> --omni --host 0.0.0.0 --port 8010 --task-type CustomVoice）
  # null の場合はローカルにモデルをロードして合成する（後方互換）
  server_url: "http://localhost:8010"
  model: "Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice"
  task_type: "CustomVoice"  # vllm-omni タスクタイプ（CustomVoice / VoiceDesign / Base）
  sample_rate: 24000   # 出力サンプルレート（ネイティブ 12kHz → librosa でアップサンプル）
  voice: "Vivian"      # 話者名
  language: "Japanese" # 合成言語
  # 音声スタイル指示（1.7B CustomVoice のみ有効）— vllm-omni では "instructions" フィールド
  instructions: "NHKのアナウンサーが標準語で読み上げるように、日本語のピッチアクセントを正確に守って話してください。各単語のアクセント核を意識し、句末は自然に下降させてください。"
  # 生成パラメータ（イントネーション安定化）
  temperature: 0.8
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
