# Safety View Agent - Default Configuration

# Agent parameters
agent:
  max_steps: 1    # 実行時間短縮：3ステップで判定
  enable_yolo: false

# LLM configuration
llm:
  # Provider: "vllm" (local) or "openai" (API)
  provider: "openai"

  # vLLM settings (local server)
  vllm:
    base_url: "http://localhost:8000"  # Override via LLM_BASE_URL
    model: "your-local-model"          # Override via LLM_MODEL
    api_key: "EMPTY"
    timeout_s: 60.0

  # OpenAI settings (API)
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-5-nano-2025-08-07"    # Vision-capable model (Override via OPENAI_MODEL)
    api_key: null                      # Must be set via OPENAI_API_KEY
    timeout_s: 60.0

# VLM 設定（Vision Language Model / 画像分析専用）
# model: null の場合 → llm.openai.model を自動参照（共有設定）
vlm:
  provider: "openai"
  openai:
    base_url: "https://api.openai.com/v1"
    model: null    # null → llm.openai.model を流用（gpt-5-nano-2025-08-07）
    timeout_s: 60.0

# LLM トークン設定
tokens:
  vision_max_completion_tokens: 5000  # Vision API: 推論 + 応答用（gpt-5-nano は推論に 4000+ 使用）
  chat_max_tokens: 2000               # テキスト生成用

# Thresholds
thresholds:
  risk_stop_threshold: 0.2      # Stop if max unobserved risk <= this
  hazard_focus_threshold: 0.6   # Enforce high-risk unobserved coverage

# Dataset/adapter
dataset:
  type: "stub"  # or "inspesafe_v1" in future
  num_samples: 3

# Evaluation
evaluation:
  metrics:
    - coverage_score
    - hazard_detection_rate
  output_dir: "outputs/eval"

# Finetuning (if applicable)
finetuning:
  enabled: false
  config: "dummy"  # "dummy" or "lora"
  output_dir: "finetuning/outputs"
