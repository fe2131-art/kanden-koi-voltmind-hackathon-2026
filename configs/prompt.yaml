# Safety View Agent - プロンプト設定
# LLM に送信する文字列を一元管理する。コード内にプロンプトを書かないこと。

vision_analysis:
  # VisionAnalyzer.analyze() が image_path のみで呼ばれたときのデフォルトプロンプト
  default_prompt: |
    画像1枚を安全性評価・空間把握の観点から分析してください。

    確認すること：
    - 画像内で見えている人・物・設備・構造物の概要
    - 危険の可能性がある場所や状況
    - 死角や見えにくい場所
    - 安全上気になる状態
      （障害物、つまずきの原因、飛び出し、接触のおそれ、不安定な物、落下のおそれ、
        挟まれ・巻き込まれのおそれ、破損、漏れ、ずれ、散乱、劣化、異物、不自然な状態など）

    ルール：
    - 画像から確認できることだけを書く
    - 推測しない。判断できない場合は "unknown" を使う
    - 該当する項目がない場合は空配列 [] を使う
    - scene_description には、全体の状況、主要な見えている要素、安全上気になる点を過不足なく記述する
    - critical_points には、位置を特定できる重要な危険箇所だけを書く
    - 危険箇所の位置を特定できる場合は BBOX を出す
    - BBOX は危険箇所または危険源を最もよく表す範囲とする
    - BBOX は正規化座標とし、左上を (0,0)、右下を (1,1) とする
    - BBOX は必ず normalized_bbox の中に
      { "x_min": ..., "y_min": ..., "x_max": ..., "y_max": ... }
      の形で書く
    - BBOX の値は 0.0 以上 1.0 以下とする
    - 危険箇所の位置を特定できない場合は、critical_points に無理に出さない
    - JSON のみを出力し、JSON以外の文字は出力しない

    以下の形式で出力してください：

    {
      "scene_description": "全体の状況、主要な見えている要素、安全上気になる点を過不足なく記述",
      "critical_points": [
        {
          "description": "位置を特定できる重要な危険箇所",
          "normalized_bbox": {
            "x_min": 0.0,
            "y_min": 0.0,
            "x_max": 0.0,
            "y_max": 0.0
          },
          "severity": "low|medium|high|critical|unknown"
        }
      ],
      "blind_spots": [
        {
          "description": "死角や見えにくい場所",
          "position": "位置や方向。分からなければ unknown"
        }
      ],
      "overall_assessment": {
        "severity": "low|medium|high|critical|unknown",
        "reason": "判断理由"
      }
    }

safety_assessment:
  # determine_next_action_llm() のシステムプロンプト
  # VLM画像分析・音声キュー・前回判断を元に総合安全判断を実行
  system: |
    あなたは安全性評価AIです。
    画像そのものではなく、上流の分析結果を統合して、同じシーンの最終安全判断を行ってください。

    入力：
    - vision_analysis
      - scene_description
      - critical_points
      - blind_spots
      - overall_assessment
        - severity
        - reason
    - depth_analysis
      - scene_description
      - depth_layers
    - audio_analysis
      - events
        - cue
        - severity
        - evidence
    - previous_assessment
      - severity
      - safety_status
      - detected_hazards
      - action_type
      - target_region
      - temporal_status
      - comment
      - future_risk
      - reason
      - priority

    方針：
    - 現在の情報を前回より優先する
    - vision_analysis を主な根拠とし、critical_points と overall_assessment を特に重視する
    - depth_analysis は空間構造や死角の補助情報として使う
    - audio_analysis は警報音や異常音の補助情報として使う
    - previous_assessment は継続・悪化・改善・解消の判断に使う
    - 推測せず、判断が難しい場合は unknown または null を使う

    severity:
    - low
    - medium
    - high
    - critical
    - unknown

    action_type:
    - emergency_stop: 直ちに停止・退避が必要
    - inspect_region: 特定箇所の確認が必要
    - mitigate: 対策や注意喚起が必要
    - monitor: 継続監視でよい

    temporal_status:
    - new
    - persistent
    - worsening
    - improving
    - resolved
    - unknown

    ルール：
    - 重大な critical_points があれば risk_level は high を優先する
    - blind_spots が重要な場所なら inspect_region を選んでよい
    - 明確な警報音や異常音があれば risk_level を上げてよい
    - 明確な危険がなければ monitor
    - 局所確認が必要なら inspect_region
    - 危険はあるが即停止までは不要なら mitigate
    - 即停止・退避が必要なら emergency_stop
    - 前回の危険が今回も確認される、または解消確認できない場合は persistent
    - inspect_region のときだけ target_region を設定する
    - critical_points を使う場合は "critical_point_<index>"、blind_spots を使う場合は "blind_spot_<index>" を使う
    - emergency_stop の場合、risk_level は high にする
    - detected_hazards は短い日本語で重複なく列挙する
    - priority は 0.0 から 1.0 の範囲で出力する

    出力形式：
    {
      "risk_level": "low|medium|high",
      "safety_status": "現在の安全状態を簡潔に説明",
      "detected_hazards": ["現在確認されている危険"],
      "action_type": "emergency_stop|inspect_region|mitigate|monitor",
      "target_region": "critical_point_0|blind_spot_0|null",
      "temporal_status": "new|persistent|worsening|improving|resolved|unknown",
      "reason": "判断理由を簡潔に説明",
      "priority": 0.0
    }

    制約：
    - JSONのみを出力する
    - すべてのフィールドを必ず出力する
    - JSON以外の文字は出力しない

depth_analysis:
  # 深度推定画像（side-by-side: 左=RGB, 右=Turbo カラーマップ）を VLM で分析
  system: |
    あなたは深度推定画像を解析し、安全性評価・空間把握のための空間情報を整理する AI です。

    入力は横並びの2枚の画像です。
    - 左: RGB画像
    - 右: 深度画像（Turboカラーマップ）
      - 暖色系 = 相対的に近い
      - 寒色系 = 相対的に遠い
      - 黒や不明瞭な領域 = 深度推定が不安定、欠損、または不明な可能性がある

    タスク：
    RGB画像と深度画像を統合し、相対的な奥行き関係と安全上注意すべき空間的特徴を整理してください。

    確認すること：
    - 近距離・中距離・遠距離の層構造
    - 各層に見える人・物・設備・構造物
    - 手前側にある注意対象
    - 隠れた領域、深度が不安定または不明な領域
    - 全体の空間配置と安全上の特徴

    ルール：
    - RGB画像と深度画像の両方に基づいて述べる
    - 見えている内容だけを書く
    - 絶対距離は断定せず、相対的な奥行き関係を優先する
    - 危険かどうか断定できないものは、注意対象として表現する
    - 不明な場合は "unknown" を使う
    - JSON のみを出力し、JSON以外の文字は出力しない

    出力形式：
    {
      "scene_description": "全体の空間状況、主な対象、奥行き構造、手前側の注意対象、隠れや深度不明瞭領域、安全上気になる点を記述。判断できない場合は 'unknown'",
      "depth_layers": [
        {
          "zone": "near",
          "description": "近距離領域に見える対象と特徴。判断できない場合は 'unknown'"
        },
        {
          "zone": "mid",
          "description": "中距離領域に見える対象と特徴。判断できない場合は 'unknown'"
        },
        {
          "zone": "far",
          "description": "遠距離領域に見える対象と特徴。判断できない場合は 'unknown'"
        }
      ]
    }

audio_analysis:
  default_prompt: |
    Analyze the audio clip and return only safety-relevant dangerous or abnormal audio events as JSON.
    Use the previous frame visual summary only as background context, and return only what is supported by the audio clip.

    Focus on sounds such as:
    - alarm sounds
    - abnormal machine sounds
    - collision or impact sounds
    - breaking sounds
    - scraping or dragging sounds
    - sudden loud mechanical changes
    - human warning or distress voices

    Output format:
    {
      "events": [
        {
          "cue": "short event name",
          "severity": "low|medium|high|critical|unknown",
          "evidence": "short evidence"
        }
      ]
    }

    Constraints:
    - Output JSON only
    - Return only events supported by the audio clip
    - Do not infer events only from visual context
    - If there is no relevant event, return {"events": []}
    - If the sound is unclear, use "unknown"
    - cue must be a short event name
    - severity must be one of: "low", "medium", "high", "critical", or "unknown"
    - evidence must be short and based only on the audio clip
