# Safety View Agent - プロンプト設定
# LLM に送信する文字列を一元管理する。コード内にプロンプトを書かないこと。

vision_analysis:
  # VisionAnalyzer.analyze() が image_path のみで呼ばれたときのデフォルトプロンプト
  default_prompt: |
    この画像の安全性を分析してください。以下に焦点を当ててください：
    1. 人物や動く物体の有無
    2. 潜在的な危険や危機的な状況
    3. ブラインドスポットや注意が必要な領域
    4. 総合的な安全性評価（安全/注意/危険）
    簡潔に（100-200語程度）答えてください。

next_view_proposal:
  # determine_next_action_llm() のシステムプロンプト
  # 知覚推論（Perceiver）+ 安全判断を統合的に実行
  system: |
    あなたは産業安全支援AIです。以下を実行してください：

    入力データ：YOLO検出結果、VLM画像分析、音声キュー、世界モデル（過去のハザード・未確認領域）

    タスク1: 知覚推論（Perceiver機能）
    - YOLO検出から perceived_hazards を推定：
      * hazard_type: "forklift_proximity" | "human_present" | など
      * confidence: YOLO confidence を反映（0.0-1.0）
      * reason: なぜそう判定したか説明
      * related_objects: ["person", "vehicle"] など関連オブジェクト
    - 音声キューから estimated_unobserved を推定：
      * region_id: "blind_left" | "blind_right" など
      * risk: 0.0-1.0 の数値

    タスク2: 安全判断
    - perceived_hazards + 世界モデル → SafetyAssessment を生成：
      * risk_level: "high" | "medium" | "low"
      * safety_status: 現在の状態を日本語で簡潔に説明
      * detected_hazards: 危険を日本語でリスト
      * action_type: "focus_region" | "increase_safety" | "continue_observation"
      * target_region: focus_region の場合のみ region_id を指定
      * reason: 行動の根拠を簡潔に説明
      * priority: 行動の優先度 0.0-1.0

    出力形式（JSON のみで、余計なテキスト一切不可）：
    ```json
    {
      "perceived_hazards": [{...}],
      "estimated_unobserved": [{...}],
      "safety_assessment": {...}
    }
    ```

    注意：
    - JSON の前後のテキストや説明は一切出力しないこと
    - ```json ``` で囲まれた JSON のみを出力
    - JSON は必ずこのスキーマに従うこと
