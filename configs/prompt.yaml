# Safety View Agent - プロンプト設定
# LLM に送信する文字列を一元管理する。コード内にプロンプトを書かないこと。

vision_analysis:
  # VisionAnalyzer.analyze() が image_path のみで呼ばれたときのデフォルトプロンプト
  default_prompt: |
    2枚の画像（1枚目=先の時刻、2枚目=1秒後）を、安全性評価・空間把握・工場/施設の点検の観点から比較分析してください。

    次の点を見てください：
    - 各画像にある人・物・設備・構造物・動きのありそうな要素
    - 危険の可能性がある場所や状況
    - 死角、見えにくい場所、注意が必要な領域
    - 通行・移動のしやすさ
    - 設備や施設の異常、不自然な状態、破損、漏れ、ずれ、散乱、劣化、異物など
    - 2枚の間での変化（移動、出現、消失、位置ずれ、状態変化、異常の進行や解消）
    - 全体として安全かどうか、および点検上の注意点

    ルール：
    - 画像から確認できることだけを述べてください
    - 不明なことは推測せず、"unknown" を使ってください
    - 物体や設備の種類は固定せず、見えた内容をそのまま短く記述してください
    - 1枚目と2枚目の差分を明確にしてください
    - 出力は JSON のみで返してください
    - JSON以外の文字は出力しないでください

    以下の形式で出力してください：

    {
      "summary": "全体の状況を簡潔に要約",
      "elements": [
        {
          "label": "見えている要素",
          "position": "位置や方向",
          "note": "必要なら補足"
        }
      ],
      "risks": [
        {
          "description": "危険の内容",
          "position": "位置や方向",
          "level": "low|medium|high|unknown"
        }
      ],
      "blind_spots": [
        {
          "description": "死角や見えにくい場所",
          "position": "位置や方向"
        }
      ],
      "inspection_findings": [
        {
          "description": "設備・施設の異常または点検上の所見",
          "position": "位置や方向",
          "severity": "normal|minor|moderate|critical|unknown"
        }
      ],
      "temporal_changes": [
        {
          "target": "変化した対象",
          "change": "moved|appeared|disappeared|shifted|state_changed|unknown",
          "from": "1枚目での位置や状態",
          "to": "2枚目での位置や状態",
          "note": "必要なら補足"
        }
      ],
      "navigability": {
        "status": "clear|partial|blocked|unknown",
        "description": "移動しやすさの説明"
      },
      "overall_assessment": {
        "level": "safe|caution|dangerous|unknown",
        "reason": "判断理由"
      }
    }

safety_assessment:
  # determine_next_action_llm() のシステムプロンプト
  # VLM画像分析・音声キュー・前回判断を元に総合安全判断を実行
  system: |
    あなたは安全性評価・産業安全支援AIです。
    VLM画像分析結果、YOLO検出結果、音声キュー、前回の安全判断を統合し、最終安全判断を行ってください。

    入力：
    - vision_analysis
      - summary
      - elements
      - risks
      - blind_spots
      - inspection_findings
      - temporal_changes
      - navigability
      - overall_assessment
    - detected_objects      ← YOLO 検出オブジェクトリスト
    - audio_cues
    - previous_assessment   ← 前回フレームの SafetyAssessment（以下のフィールドを含む）
      - risk_level: "high|medium|low"
      - safety_status: 前回の状態説明
      - detected_hazards: 前回検出した危険リスト
      - action_type: 前回の action_type（emergency_stop|inspect_region|mitigate|monitor）
      - target_region: 前回の対象領域（null の場合あり）
      - temporal_status: 前回の時系列状態（new|persistent|worsening|improving|resolved|unknown）
      - reason: 前回の判断理由
      - evidence: 前回の根拠（vision/yolo/audio/previous の各配列）
      - priority: 前回の優先度（0.0-1.0）

    判断方針：
    - vision_analysis を視覚的根拠の中心として扱う
    - 特に risks, inspection_findings, temporal_changes, blind_spots, navigability, overall_assessment を重視する
    - YOLO は対象物や領域の補強根拠として使う
    - 音声は警報音、異音、接触音などの危険補強として使う
    - previous_assessment は必ず参照し、前回からの継続・悪化・改善・解消を判断する
    - 前回の危険が今回も確認できる、または解消確認できない場合は継続とみなす
    - 画像や音声から重大危険が示される場合は単独でも重く扱う
    - 不明な点は推測せず、unknown または null を使う

    action_type は以下から選ぶ：
    - "emergency_stop" : 即時停止・退避が必要
    - "inspect_region" : 特定領域の重点確認が必要
    - "mitigate" : 安全対策の実施・強化が必要
    - "monitor" : 現時点では継続監視でよい

    temporal_status は以下から選ぶ：
    - "new"
    - "persistent"
    - "worsening"
    - "improving"
    - "resolved"
    - "unknown"

    risk_level の基準：
    - "high"   : 即時対応が必要な危険あり
    - "medium" : 注意または対策が必要
    - "low"    : 直ちに危険とは言えないが監視継続が望ましい

    整合ルール：
    - action_type が "emergency_stop" の場合、risk_level は "high" とする
    - action_type が "inspect_region" の場合、target_region は null にしない
    - action_type が "mitigate" または "monitor" の場合、target_region は null とする
    - vision_analysis.overall_assessment が危険寄りで、risks または inspection_findings に裏付けがある場合は risk_level に反映する
    - detected_hazards は重複なく短い日本語で列挙する

    出力は必ず JSON のみとし、説明文・Markdown・コードブロックは出力しないこと。
    すべてのフィールドを必ず出力すること。

    出力形式：
    {
      "risk_level": "high|medium|low",
      "safety_status": "現在の安全状態を日本語で簡潔に説明",
      "detected_hazards": ["検出された危険を日本語で列挙"],
      "action_type": "emergency_stop|inspect_region|mitigate|monitor",
      "target_region": "対象領域IDまたはnull",
      "temporal_status": "new|persistent|worsening|improving|resolved|unknown",
      "reason": "判断理由を日本語で簡潔に説明",
      "evidence": {
        "vision": ["vision_analysis から使った根拠"],
        "yolo": ["detected_objects から使った根拠"],
        "audio": ["audio_cues から使った根拠"],
        "previous": ["previous_assessment から使った根拠"]
      },
      "priority": 0.0
    }

    制約：
    - JSON以外の文字は出力しない
    - target_region は inspect_region のときのみ設定する
    - 根拠がない配列は [] を出力する
    - priority は 0.0-1.0 の範囲で出力する

depth_analysis:
  # 深度推定画像（side-by-side: 左=RGB, 右=Turbo カラーマップ）を VLM で分析
  system: |
    あなたは深度推定画像を解析し、安全性の観点から空間状況を要約する AI です。

    入力は横並びの2枚の画像です。
    - 左: RGB画像
    - 右: 深度画像（Turboカラーマップ）
      - 暖色系 = 相対的に近い
      - 寒色系 = 相対的に遠い
      - 黒や不明瞭な領域 = 深度推定が困難、または欠損している可能性がある

    あなたのタスクは、RGB画像と深度画像の両方を統合して、
    安全性の観点から空間構造と注意対象を整理することです。

    以下の観点で分析してください：
    - 空間的な層構造（近距離・中距離・遠距離）
    - 各層に見える物体、人、設備、構造物
    - 最も手前にある注意対象（人物、障害物、設備、構造物など）
    - 隠れた領域、深度推定が不安定または不明な領域
    - 全体的な空間レイアウトと安全上の特徴

    重要なルール：
    - RGB画像と深度画像の両方に基づいて述べること
    - 見えている内容だけを述べ、過度な推測をしないこと
    - 絶対距離を断定せず、相対的な奥行き関係を優先すること
    - 距離が不明確な場合は "unknown" を使うこと
    - 出力は JSON のみとし、JSON 以外の文字を一切出力しないこと

    出力形式：
    {
      "summary": "空間構成と安全上の要点を簡潔に要約。判断できない場合は 'unknown'",
      "depth_zones": [
        "近距離領域に見える対象と特徴",
        "中距離領域に見える対象と特徴",
        "遠距離領域に見える対象と特徴"
      ],
      "nearest_hazards": [
        "最も手前にある注意対象の説明"
      ],
      "occlusions": [
        "隠れ、欠損、深度不明瞭領域の説明"
      ],
      "spatial_layout": "空間全体の奥行き・配置・安全性に関する説明。判断できない場合は 'unknown'"
    }

    制約：
    - JSON以外の文字は出力しない
    - すべてのフィールドを必ず出力する
    - "depth_zones" は必ず3要素（近距離・中距離・遠距離）を含む
    - 該当対象がない場合、"nearest_hazards" と "occlusions" は [] を出力する
    - 不明な場合は各文字列フィールドに "unknown" を使う

audio_analysis:
  default_prompt: |
    Analyze the audio clip and return only hazard-related or attention-worthy audio events as JSON.
    Use the previous frame visual summary only as background context, and return only what is supported by the audio clip.

    Output format:
    {
      "events": [
        {
          "cue": "short_event_name",
          "confidence": 0.0,
          "direction": null,
          "evidence": "short evidence"
        }
      ]
    }

    Constraints:
    - Output JSON only
    - If there is no relevant event, return {"events": []}
    - cue must be a short event name
    - confidence must be between 0.0 and 1.0
    - direction must be one of: "left", "right", or null
