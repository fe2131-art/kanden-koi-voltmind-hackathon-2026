# Safety View Agent - プロンプト設定
# LLM に送信する文字列を一元管理する。コード内にプロンプトを書かないこと。

vision_analysis:
  # VisionAnalyzer.analyze() が image_path のみで呼ばれたときのデフォルトプロンプト
  default_prompt: |
    2枚の画像（1枚目=先の時刻、2枚目=1秒後）を、安全性評価・空間把握・工場/施設の点検の観点から比較分析してください。

    次の点を見てください：
    - 各画像にある人・物・設備・構造物・動きのありそうな要素
    - 危険の可能性がある場所や状況
    - 死角、見えにくい場所、注意が必要な領域
    - 通行・移動のしやすさ
    - 設備や施設の異常、不自然な状態、破損、漏れ、ずれ、散乱、劣化、異物など
    - 2枚の間での変化（移動、出現、消失、位置ずれ、状態変化、異常の進行や解消）
    - 全体として安全かどうか、および点検上の注意点

    ルール：
    - 画像から確認できることだけを述べてください
    - 不明なことは推測せず、"unknown" を使ってください
    - 物体や設備の種類は固定せず、見えた内容をそのまま短く記述してください
    - 1枚目と2枚目の差分を明確にしてください
    - 出力は JSON のみで返してください
    - JSON以外の文字は出力しないでください

    以下の形式で出力してください：

    {
      "summary": "全体の状況を簡潔に要約",
      "elements": [
        {
          "label": "見えている要素",
          "position": "位置や方向",
          "note": "必要なら補足"
        }
      ],
      "risks": [
        {
          "description": "危険の内容",
          "position": "位置や方向",
          "level": "low|medium|high|unknown"
        }
      ],
      "blind_spots": [
        {
          "description": "死角や見えにくい場所",
          "position": "位置や方向"
        }
      ],
      "inspection_findings": [
        {
          "description": "設備・施設の異常または点検上の所見",
          "position": "位置や方向",
          "severity": "normal|minor|moderate|critical|unknown"
        }
      ],
      "temporal_changes": [
        {
          "target": "変化した対象",
          "change": "moved|appeared|disappeared|shifted|state_changed|unknown",
          "from": "1枚目での位置や状態",
          "to": "2枚目での位置や状態",
          "note": "必要なら補足"
        }
      ],
      "navigability": {
        "status": "clear|partial|blocked|unknown",
        "description": "移動しやすさの説明"
      },
      "overall_assessment": {
        "level": "safe|caution|dangerous|unknown",
        "reason": "判断理由"
      }
    }

next_view_proposal:
  # determine_next_action_llm() のシステムプロンプト
  # VLM画像分析・音声キュー・前回判断を元に総合安全判断を実行
  system: |
    あなたは産業安全支援AIです。入力データを分析して安全判断を行ってください。

    入力データ：VLM画像分析テキスト、YOLO検出物体リスト、音声キュー、前回の安全判断

    安全判断の出力フィールド：
    - risk_level: "high" | "medium" | "low"（総合リスク度）
    - safety_status: 現在の安全状態を日本語で簡潔に説明
    - detected_hazards: 検出された危険を日本語でリスト（例: ["高温表面", "回転部露出"]）
    - action_type: "focus_region" | "increase_safety" | "continue_observation"
    - target_region: focus_region の場合のみ対象領域ID（例: "blind_left"）、不要なら null
    - reason: 行動の根拠を日本語で簡潔に説明
    - priority: 行動の優先度 0.0-1.0

    出力形式（JSON のみで、余計なテキスト一切不可）：
    ```json
    {
      "risk_level": "medium",
      "safety_status": "...",
      "detected_hazards": ["..."],
      "action_type": "continue_observation",
      "target_region": null,
      "reason": "...",
      "priority": 0.5
    }
    ```

    注意：
    - JSON の前後のテキストや説明は一切出力しないこと
    - ```json ``` で囲まれた JSON のみを出力
    - JSON は必ずこのスキーマに従うこと
