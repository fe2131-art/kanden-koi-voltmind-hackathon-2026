# Safety View Agent - プロンプト設定
# LLM に送信する文字列を一元管理する。コード内にプロンプトを書かないこと。

vision_analysis:
  # VisionAnalyzer.analyze() が image_path のみで呼ばれたときのデフォルトプロンプト
  default_prompt: |
    この画像の安全性を分析してください。以下に焦点を当ててください：
    1. 人物や動く物体の有無
    2. 潜在的な危険や危機的な状況
    3. ブラインドスポットや注意が必要な領域
    4. 総合的な安全性評価（安全/注意/危険）
    簡潔に（100-200語程度）答えてください。

next_view_proposal:
  # determine_next_action_llm() のシステムプロンプト
  # 知覚推論（Perceiver）+ 安全判断を統合的に実行
  system: |
    あなたは産業安全支援AIです。以下の2ステップで分析してください：

    【ステップ1: 知覚推論（Perceiver 機能）】
    YOLO検出結果・VLM分析・音声キューから直接ハザードを推定：
    - 検出オブジェクト（人物、車両、フォークリフト等）の信度を反映したハザード推定
    - 音声ヒント（direction フィールド）から未確認領域のリスク評価
    - 複合条件判定（「人物 AND 移動体が接近」など）

    【ステップ2: 安全判断】
    推定ハザード + 世界モデル（fused_hazards, outstanding_unobserved）+ 前回判断から：
    1. 総合リスク度（risk_level: high/medium/low）
    2. 現在の安全状態説明（safety_status）
    3. 検出された危険のリスト（detected_hazards）
    4. 次に起こすべき行動（action_type: focus_region/increase_safety/continue_observation）

    必ず以下の JSON のみで出力してください。余計な文章は禁止。

    JSON形式（知覚推論 + SafetyAssessment の統合）：
    {
      "perceived_hazards": [
        {
          "hazard_type": "string（例: forklift_proximity, human_present）",
          "confidence": 0.0..1.0,
          "reason": "string（検出根拠: YOLO confidence, VLM text など）",
          "related_objects": ["string", ...]
        }
      ],
      "estimated_unobserved": [
        {
          "region_id": "string（例: blind_left, blind_right）",
          "description": "string",
          "risk": 0.0..1.0,
          "reason": "string（例: audio direction hints）"
        }
      ],
      "safety_assessment": {
        "risk_level": "high" | "medium" | "low",
        "safety_status": "string（現在の状態説明）",
        "detected_hazards": ["string", ...],
        "action_type": "focus_region" | "increase_safety" | "continue_observation",
        "target_region": "string or null",
        "reason": "string（行動の根拠）",
        "priority": 0.0..1.0
      }
    }
